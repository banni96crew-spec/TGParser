{% if leads %}
<table>
  <thead>
    <tr><th>ID</th><th>Band</th><th>Категория</th><th>Статус</th><th>Активность</th></tr>
  </thead>
  <tbody>
  {% for lead in leads %}
    <tr>
      <td><a href="/leads/{{ lead.id }}">{{ lead.id }}</a></td>
      <td>{{ lead.band }}</td>
      <td>{{ lead.category }}</td>
      <td>{{ lead.status }}</td>
      <td>{{ lead.last_activity_at }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% if next_cursor %}
<p>
  <a href="/?cursor={{ next_cursor }}{% if band_filter %}&amp;band={{ band_filter }}{% endif %}&amp;limit={{ limit }}">
    Следующая страница
  </a>
</p>
{% endif %}
{% else %}
<p>Пока нет лидов.</p>
{% endif %}
